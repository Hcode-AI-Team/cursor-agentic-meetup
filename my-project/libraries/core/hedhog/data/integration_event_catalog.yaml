  metadata_schema: null

- slug: core.role.updated
  name: Core role updated
  module: core
  aggregate_type: role
  description: Disparado quando um perfil de acesso é atualizado.
  status: active
  payload_schema:
    id:
      type: number
      description: ID do perfil atualizado
    slug:
      type: string
