      description: Novo slug do perfil
  metadata_schema: null

- slug: core.role.deleted
  name: Core role deleted
  module: core
  aggregate_type: role
  description: Disparado quando um ou mais perfis de acesso são excluídos.
  status: active
  payload_schema:
    ids:
      type: array
      description: IDs dos perfis excluídos
  metadata_schema: null

