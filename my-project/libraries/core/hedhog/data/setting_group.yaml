          pt: Comprime automaticamente imagens enviadas para reduzir o tamanho do arquivo
        value: 'true'
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
      - slug: image-compression-quality
        type: number
        component: input-number
        name:
          en: Compression Quality (1–100)
          pt: Qualidade de Compressão (1–100)
        description:
          en: Image quality after compression. Higher values preserve more detail but produce larger files (default 80)
          pt: Qualidade da imagem após compressão. Valores maiores preservam mais detalhes mas produzem arquivos maiores (padrão 80)
        value: 80
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
      - slug: image-compression-types
        type: array
        component: checkbox
        name:
          en: Compress These Image Types
          pt: Comprimir Estes Tipos de Imagem
        description:
          en: MIME types that will be automatically compressed on upload
          pt: Tipos MIME que serão comprimidos automaticamente no upload
        value: '["image/jpeg","image/png","image/webp"]'
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
        relations:
          setting_list:
            - value: image/jpeg
              order: 0
            - value: image/png
              order: 1
            - value: image/webp
              order: 2
            - value: image/bmp
              order: 3
            - value: image/tiff
              order: 4
      - slug: image-webp-conversion-enabled
        type: boolean
        component: switch
        name:
          en: Enable WebP Conversion
          pt: Habilitar Conversão para WebP
        description:
          en: Automatically convert uploaded images to WebP format for better compression and web performance
          pt: Converte automaticamente imagens enviadas para formato WebP para melhor compressão e performance web
        value: 'true'
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
      - slug: image-webp-convert-types
        type: array
        component: checkbox
        name:
          en: Convert These Types to WebP
          pt: Converter Estes Tipos para WebP
        description:
          en: MIME types that will be automatically converted to WebP on upload. WebP conversion takes priority over regular compression when both are enabled
          pt: Tipos MIME que serão convertidos automaticamente para WebP no upload. A conversão para WebP tem prioridade sobre compressão simples quando ambas estão ativas
        value: '["image/jpeg","image/png"]'
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
        relations:
          setting_list:
            - value: image/jpeg
              order: 0
            - value: image/png
              order: 1
            - value: image/gif
              order: 2
            - value: image/bmp
              order: 3
            - value: image/tiff
              order: 4
      - slug: image-max-dimension
        type: number
        component: input-number
        name:
          en: Max Image Dimension (px)
          pt: Dimensão Máxima da Imagem (px)
        description:
          en: Largest allowed width/height for uploaded images without a specific target size. Bigger images are scaled down keeping aspect ratio. 0 disables this cap (default 1920)
          pt: Maior largura/altura permitida para imagens enviadas sem tamanho-alvo específico. Imagens maiores são reduzidas mantendo a proporção. 0 desativa este limite (padrão 1920)
        value: 1920
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
      - slug: image-cache-ttl-seconds
        type: number
        component: input-number
        name:
          en: Image Cache Duration (seconds)
          pt: Duração do Cache de Imagens (segundos)
        description:
          en: How long browsers cache images served by the dedicated image endpoint (in seconds). Default 2592000 = 30 days
          pt: Por quanto tempo os navegadores armazenam em cache as imagens servidas pelo endpoint dedicado de imagens (em segundos). Padrão 2592000 = 30 dias
        value: 2592000
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
      - slug: file-cache-ttl-seconds
        type: number
        component: input-number
        name:
          en: File Cache Duration (seconds)
          pt: Duração do Cache de Arquivos (segundos)
        description:
          en: How long browsers cache generic files served by the open endpoint (in seconds). Default 86400 = 1 day
          pt: Por quanto tempo os navegadores armazenam em cache os arquivos genéricos servidos pelo endpoint de abertura (em segundos). Padrão 86400 = 1 dia
        value: 86400
        user_override: false
        subgroup_id:
          where:
            slug: image-optimization
- slug: integration
  icon: webhook
  name:
    en: Integration
    pt: Integração
  description:
    en: Configure event-driven architecture with outbox pattern for reliable cross-module event processing
    pt: Configure arquitetura orientada por eventos com padrão outbox para processamento confiável de eventos entre módulos
  relations:
    setting:
      - slug: outbox-enabled
        type: boolean
        component: switch
        name:
          en: Outbox System
          pt: Sistema de Caixa de Saída
        description:
          en: Enable the event outbox system for reliable event delivery across modules
          pt: Habilitar o sistema de caixa de saída de eventos para entrega confiável de eventos entre módulos
        value: true
        user_override: false
        subgroup_id:
          where:
            slug: outbox-general
      - slug: outbox-processor-enabled
        type: boolean
        component: switch
        name:
          en: Background Processor
          pt: Processador em Segundo Plano
        description:
          en: Enable the background job that processes and publishes pending events
          pt: Habilitar o trabalho em segundo plano que processa e publica eventos pendentes
        value: true
        user_override: false
        subgroup_id:
          where:
            slug: outbox-general
      - slug: outbox-startup-drain-enabled
        type: boolean
        component: switch
        name:
          en: Startup Drain
          pt: Drenagem na Inicialização
        description:
          en: Process all pending events immediately on application startup before accepting traffic
          pt: Processar todos os eventos pendentes imediatamente na inicialização da aplicação antes de aceitar tráfego
        value: true
        user_override: false
        subgroup_id:
          where:
            slug: startup-behavior
      - slug: outbox-startup-drain-batch-size
        type: number
        component: input-number
        name:
          en: Batch Size
          pt: Tamanho de Lote
        description:
          en: Number of events processed per iteration during startup drain
          pt: Número de eventos processados por iteração durante a drenagem na inicialização
        value: 50
        user_override: false
        subgroup_id:
          where:
            slug: startup-behavior
      - slug: outbox-batch-size
        type: number
        component: input-number
        name:
          en: Batch Size
          pt: Tamanho do Lote
        description:
          en: Number of events to process in each background processor iteration during normal operation
          pt: Número de eventos a processar em cada iteração do processador em segundo plano durante operação normal
        value: 10
        user_override: false
        subgroup_id:
          where:
            slug: processing-config
      - slug: outbox-polling-interval-ms
        type: number
        component: input-number
        name:
          en: Active Poll Interval
          pt: Intervalo de Sondagem Ativa
        description:
          en: Milliseconds between processor polls when events are pending. Lower values = faster processing but higher CPU
          pt: Milissegundos entre sondagens quando eventos estão pendentes. Valores menores = processamento mais rápido mas maior CPU
        value: 5000
        user_override: false
        subgroup_id:
          where:
            slug: processing-config
      - slug: outbox-idle-polling-interval-ms
        type: number
        component: input-number
        name:
          en: Idle Poll Interval
          pt: Intervalo de Sondagem Ociosa
        description:
          en: Milliseconds between processor polls when no events are waiting. Higher values = lower CPU usage during idle
          pt: Milissegundos entre sondagens quando não há eventos esperando. Valores maiores = menor uso de CPU em ocioso
        value: 30000
        user_override: false
        subgroup_id:
          where:
            slug: processing-config
      - slug: outbox-processing-lease-ms
        type: number
        component: input-number
        name:
          en: Processing Lock Duration
          pt: Duração do Lock de Processamento
        description:
          en: Milliseconds an event stays locked while being processed before becoming available for retry
          pt: Milissegundos que um evento fica bloqueado durante o processamento antes de ficar disponível para reprocessamento
        value: 30000
        user_override: false
        subgroup_id:
          where:
            slug: retry-config
      - slug: outbox-max-attempts
        type: number
        component: input-number
        name:
          en: Max Retry Attempts
          pt: Máximo de Tentativas de Reprocessamento
        description:
          en: Maximum number of times an event is retried before being moved to dead letter queue
          pt: Número máximo de vezes que um evento é reprocessado antes de ser movido para fila de letra morta
        value: 3
        user_override: false
        subgroup_id:
          where:
            slug: retry-config
      - slug: outbox-retry-base-delay-ms
        type: number
        component: input-number
        name:
          en: Retry Base Delay
          pt: Atraso Base de Reprocessamento
        description:
          en: Initial delay in milliseconds for exponential backoff. Increases by 2x with each retry attempt
          pt: Atraso inicial em milissegundos para retirada exponencial. Aumenta 2x a cada tentativa de reprocessamento
        value: 1000
        user_override: false
        subgroup_id:
          where:
            slug: retry-config
      - slug: outbox-dead-letter-enabled
        type: boolean
        component: switch
        name:
          en: Dead Letter Queue
          pt: Fila de Letra Morta
        description:
          en: Move permanently failed events to dead letter status for manual review and recovery
          pt: Mover eventos com falha permanente para status de letra morta para revisão e recuperação manuais
        value: true
        user_override: false
        subgroup_id:
          where:
            slug: retry-config

