- slug: general
  icon: settings
  name:
    en: General
    pt: Geral
  description:
    en: General system settings and basic configurations
    pt: Configurações gerais do sistema e configurações básicas
  relations:
    setting:
      - slug: user-avatar-cache-max-age
        type: number
        component: input-number
        name:
          en: User Avatar Cache Duration (seconds)
          pt: Duração do Cache do Avatar do Usuário (segundos)
        description:
          en: How long browsers cache user avatar images (in seconds).
          pt: Por quanto tempo os navegadores armazenam em cache as imagens de avatar de usuários (em segundos).
        value: 3600
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: api-body-size-limit
        type: number
        component: input-number
        name:
          en: API Body Size Limit (MB)
          pt: Limite do Corpo da Requisição (MB)
        description:
          en: Maximum size in megabytes for incoming API request bodies. Applies dynamically without restart (50 = 50 MB)
          pt: Tamanho máximo em megabytes para corpos de requisição recebidos pela API. Aplica-se dinamicamente sem reiniciar (50 = 50 MB)
        value: 50
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: url
        type: string
        name:
          en: System URL
          pt: URL do Sistema
        description:
          en: The public-facing base URL of the system for client requests and redirects
          pt: A URL base acessível publicamente do sistema para requisições e redirecionamentos de clientes
        value: http://localhost:3200
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: api-url
        type: string
        name:
          en: API URL
          pt: URL da API
        description:
          en: The endpoint URL where the API server is accessible
          pt: A URL do endpoint onde o servidor da API está acessível
        value: http://localhost:3100
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: app-urls
        type: array
        component: input-tags
        name:
          en: App URLs
          pt: URLs dos Aplicativos
        description:
          en: 'Base URLs for specific apps, formatted as "app=https://example.com" (one per tag). Used in transactional email links (e.g. password reset) when the request comes from that app, falling back to System URL otherwise.'
          pt: 'URLs base de apps específicos, no formato "app=https://exemplo.com" (uma por tag). Usadas em links de e-mails transacionais (ex.: redefinição de senha) quando a solicitação vem desse app, usando a URL do Sistema como alternativa.'
        value: '["training=http://localhost:3001"]'
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: installed
        type: boolean
        component: switch
        name:
          en: Installation Status
          pt: Status de Instalação
        description:
          en: Indicates whether the system has completed initial setup and installation procedures
          pt: Indica se o sistema completou os procedimentos de instalação e configuração inicial
        value: false
        user_override: false
        subgroup_id:
          where:
            slug: general-system
      - slug: pagination-page-sizes
        type: array
        component: checkbox
        name:
          en: Pagination Page Sizes
          pt: Tamanhos de Página de Paginação
        description:
          en: Available page-size options shown in the items-per-page dropdown on paginated screens throughout the system
          pt: Opções de tamanho de página exibidas no seletor de itens por página nas telas paginadas de todo o sistema
        value: '["6","12","24","48","96"]'
        user_override: false
        subgroup_id:
          where:
            slug: general-system
        relations:
          setting_list:
            - value: '6'
              order: 0
            - value: '12'
              order: 1
            - value: '24'
              order: 2
            - value: '48'
              order: 3
            - value: '96'
              order: 4
      - slug: maintenance-mode-enabled
        type: boolean
        component: switch
        name:
          en: Enable Maintenance Mode
          pt: Habilitar Modo de Manutenção
        description:
          en: Show maintenance notice on login and a global alert in authenticated pages
          pt: Exibir aviso de manutenção no login e alerta global nas páginas autenticadas
        value: false
        user_override: false
        subgroup_id:
          where:
            slug: maintenance-mode
      - slug: cleanup-batch-limit
        type: number
        component: input-number
        name:
          en: Batch Limit
          pt: Limite de Lote
        description:
          en: Maximum number of records to delete per cleanup task execution. Smaller values prevent long table locks but increase cleanup duration
          pt: Número máximo de registros a deletar por execução de tarefa de limpeza. Valores menores evitam locks prolongados mas aumentam a duração da limpeza
        value: 20000
        user_override: false
        subgroup_id:
          where:
            slug: database-cleanup
      - slug: session-retention-days
        type: number
        component: input-number
        name:
          en: Retention Period
          pt: Período de Retenção
        description:
          en: Number of days to retain expired sessions before permanent deletion. Required for audit trails and compliance purposes
          pt: Número de dias para reter sessões expiradas antes da exclusão permanente. Necessário para trilhas de auditoria e fins de conformidade
        value: 90
        user_override: false
        subgroup_id:
          where:
            slug: session-retention
      - slug: webhook-log-retention-days
        type: number
        component: input-number
        name:
          en: Webhook Log Retention Period
          pt: Período de Retenção de Logs de Webhook
        description:
          en: Number of days to keep incoming webhook execution logs before automatic deletion
          pt: Número de dias para manter logs de execução de webhooks de entrada antes da exclusão automática
        value: 30
        user_override: false
        subgroup_id:
          where:
            slug: webhook-log-retention
      - slug: notification-retention-days
        type: number
        component: input-number
        name:
          en: Notification Retention Period
          pt: Período de Retenção de Notificações
        description:
          en: Number of days to keep user notifications before automatic deletion. Unread notifications are also removed after this period
          pt: Número de dias para manter notificações de usuários antes da exclusão automática. Notificações não lidas também são removidas após este período
        value: 30
        user_override: false
        subgroup_id:
          where:
            slug: notification-retention
      - slug: stale-async-notification-hours
        type: number
        component: input-number
        name:
          en: Stale Async Notification Cleanup (hours)
          pt: Limpeza de Notificações Assíncronas Travadas (horas)
        description:
          en: Number of hours an in-progress async notification (progress below 100% and not finished) may run before it is automatically deleted
          pt: Número de horas que uma notificação assíncrona em andamento (progresso abaixo de 100% e não finalizada) pode ficar antes de ser excluída automaticamente
        value: 24
        user_override: false
        subgroup_id:
          where:
            slug: notification-retention
      - slug: access-log-retention-days
        type: number
        component: input-number
        name:
          en: Access Log Retention Period
          pt: Período de Retenção de Logs de Acesso
        description:
          en: Number of days to keep system access logs before automatic deletion
          pt: Número de dias para manter logs de acesso do sistema antes da exclusão automática
        value: 30
        user_override: false
        subgroup_id:
          where:
            slug: access-log-retention
      - slug: queue-worker-offline-cleanup-hours
        type: number
        component: input-number
        name:
          en: Offline Worker Cleanup (hours)
          pt: Limpeza de Worker Offline (horas)
        description:
          en: Number of hours a worker must be offline before it is automatically deleted
          pt: Número de horas que um worker deve estar offline antes de ser excluído automaticamente
        value: 24
        user_override: false
        subgroup_id:
          where:
            slug: worker-retention
      - slug: configured-mail
        type: boolean
        name:
          en: Email Configured
          pt: Email Configurado
        description:
          en: Indicates whether email notifications are fully configured and operational
          pt: Indica se as notificações de email estão totalmente configuradas e operacionais
        value: false
        user_override: false
        component: switch
        subgroup_id:
          where:
            slug: mail-configuration
      - slug: mail-integration-profile-id
        type: string
        component: entity-picker
        name:
          en: Mail Profile
          pt: Perfil de Email
        description:
          en: Select the mail profile to use for sending system notifications
          pt: Selecione o perfil de email a usar para enviar notificações do sistema
        value: ''
        user_override: false
        subgroup_id:
          where:
            slug: mail-configuration
      - slug: ai-openai-profile-id
        type: string
        component: entity-picker
        name:
          en: OpenAI Profile
          pt: Perfil OpenAI
        description:
          en: Integration profile (type AI / OpenAI) to use for OpenAI features
          pt: Perfil de integração (tipo IA / OpenAI) a usar para recursos de OpenAI
        value: ''
        user_override: false
        subgroup_id:
          where:
            slug: ai-configuration
      - slug: ai-gemini-profile-id
        type: string
        component: entity-picker
        name:
          en: Gemini Profile
          pt: Perfil Gemini
        description:
          en: Integration profile (type AI / Gemini) to use for Gemini features
          pt: Perfil de integração (tipo IA / Gemini) a usar para recursos de Gemini
        value: ''
        user_override: false
        subgroup_id:
          where:
            slug: ai-configuration
      - slug: mcp-enabled
        type: boolean
        component: switch
        name:
          en: Enable MCP Server
          pt: Habilitar Servidor MCP
        description:
          en: Enable or disable the MCP server and AI chat feature
          pt: Habilitar ou desabilitar o servidor MCP e o recurso de chat de IA
        value: true
        user_override: false
        subgroup_id:
          where:
            slug: mcp-configuration
      - slug: mcp-ai-profile-id
        type: string
        component: entity-picker
        name:
          en: AI Profile
          pt: Perfil de IA
        description:
          en: Integration profile (type AI) to use for MCP chat
          pt: Perfil de integração (tipo IA) a usar no chat MCP
        value: ''
        user_override: false
        subgroup_id:
          where:
            slug: mcp-configuration
- slug: authentication
  icon: lock-password
  name:
    en: Authentication
    pt: Autenticação
  description:
    en: Configure authentication methods, security policies, and credentials for user access control
    pt: Configure métodos de autenticação, políticas de segurança e credenciais para controle de acesso de usuários
  relations:
    setting:
      - slug: disable-authentication-with-email-and-password
        type: boolean
        component: switch
        name:
          en: Disable Email/Password Auth
          pt: Desabilitar Auth Email/Senha
        description:
          en: Prevent user authentication using email and password credentials, enforcing OAuth or passwordless authentication
          pt: Impedir autenticação de usuários usando credenciais de email e senha, forçando autenticação OAuth ou sem senha
        value: false
        user_override: false
        subgroup_id:
          where:
            slug: email-password-auth
      - slug: require-email-verification
        type: boolean
        component: switch
        name:
          en: Require Email Verification
          pt: Exigir Verificação de Email
        description:
          en: Require users to verify their email address before account activation and system access
          pt: Exigir que os usuários verifiquem seus endereços de email antes da ativação da conta e acesso ao sistema
        value: false
        user_override: false
        subgroup_id:
          where:
            slug: email-password-auth
      - slug: password-min-length
        type: number
        component: input-number
        name:
          en: Minimum Length
          pt: Comprimento Mínimo
        description:
          en: Minimum number of characters required for passwords
          pt: Número mínimo de caracteres obrigatórios para senhas
        value: 6
        user_override: false
        subgroup_id:
          where:
            slug: password-policy
      - slug: password-min-uppercase
        type: number
        component: input-number
        name:
          en: Uppercase Letters
          pt: Letras Maiúsculas
        description:
          en: Minimum number of uppercase letters (A-Z) required in passwords
          pt: Número mínimo de letras maiúsculas (A-Z) obrigatórias em senhas
        value: 0
        user_override: false
        subgroup_id:
          where:
            slug: password-policy
      - slug: password-min-numbers
        type: number
        component: input-number
        name:
          en: Numeric Digits
          pt: Dígitos Numéricos
        description:
          en: Minimum number of numeric digits (0-9) required in passwords
          pt: Número mínimo de dígitos numéricos (0-9) obrigatórios em senhas
        value: 0
        user_override: false
        subgroup_id:
          where:
            slug: password-policy
      - slug: password-min-symbols
        type: number
        component: input-number
        name:
          en: Special Symbols
          pt: Símbolos Especiais
        description:
          en: Minimum number of special characters (!@#$%^&*) required in passwords
          pt: Número mínimo de caracteres especiais (!@#$%^&*) obrigatórios em senhas
        value: 0
        user_override: false
        subgroup_id:
          where:
            slug: password-policy
      - slug: email-host-whitelist
        type: array
        name:
          en: Allowed Domains
          pt: Domínios Permitidos
        description:
          en: List of email domain names allowed for registration. Leave empty to allow all domains
          pt: Lista de nomes de domínios de email permitidos para registro. Deixe vazio para permitir todos os domínios
        value: '[]'
        user_override: false
        component: input-tags
        subgroup_id:
          where:
            slug: email-restrictions
      - slug: email-host-blacklist
        type: array
        name:
          en: Blocked Domains
          pt: Domínios Bloqueados
        description:
          en: List of email domain names blocked from registration and login
          pt: Lista de nomes de domínios de email bloqueados para registro e login
        value: '[]'
        user_override: false
        component: input-tags
        subgroup_id:
          where:
            slug: email-restrictions
      - slug: require-mfa
        type: boolean
        component: switch
        name:
          en: Require MFA
          pt: Exigir MFA
        description:
          en: Enforce multi-factor authentication for all users to enhance security
          pt: Forçar autenticação multifatorial para todos os usuários para aumentar a segurança
        value: false
        user_override: false
        subgroup_id:
          where:
            slug: mfa-general
      - slug: mfa-issuer
        type: string
        name:
          en: Issuer Name
          pt: Nome do Emissor
        description:
          en: Application name displayed in authenticator apps (e.g., Google Authenticator, Authy)
          pt: Nome do aplicativo exibido em aplicativos autenticadores (por exemplo, Google Authenticator, Authy)
        value: Hedhog
        user_override: false
        subgroup_id:
          where:
            slug: mfa-general
      - slug: mfa-window
        type: number
        component: input-number
        name:
          en: Tolerance Window
          pt: Janela de Tolerância
        description:
          en: Number of time periods (30-second intervals) to accept as valid before/after the current token. Higher values increase security tolerance
          pt: Número de períodos de tempo (intervalos de 30 segundos) para aceitar como válido antes/depois do token atual. Valores maiores aumentam a tolerância de segurança
        value: 1
        user_override: false
        subgroup_id:
          where:
            slug: mfa-totp
      - slug: mfa-setp
        type: number
        component: input-number
        name:
          en: Time Step (seconds)
          pt: Intervalo de Tempo (segundos)
        description:
          en: Duration in seconds each one-time password code remains valid. Standard is 30 seconds
          pt: Duração em segundos que cada código de senha única permanece válido. O padrão é 30 segundos
        value: 30
        user_override: false
        subgroup_id:
          where:
            slug: mfa-totp
      - slug: mfa-email-code-length
        type: number
        component: input-number
        name:
          en: Code Length
          pt: Comprimento do Código
        description:
          en: Number of digits for email-based MFA codes sent to user email
          pt: Número de dígitos para códigos de MFA baseados em email enviados para o email do usuário
        value: 6
        user_override: false
        subgroup_id:
          where:
            slug: mfa-email
      - slug: mfa-challenge-expiration-minutes
        type: number
        component: input-number
        name:
          en: Challenge Expiration
          pt: Expiração do Desafio
        description:
          en: Minutes before an MFA challenge expires and becomes invalid
          pt: Minutos antes de um desafio de MFA expirar e se tornar inválido
        value: 15
        user_override: false
        subgroup_id:
          where:
            slug: mfa-general
      - slug: access-token-expiration-minutes
        type: number
        component: input-number
        name:
          en: Access Token Lifetime
          pt: Duração do Token de Acesso
        description:
          en: Minutes before an access token expires. Shorter durations improve security but increase token refresh frequency
          pt: Minutos antes de um token de acesso expirar. Durações mais curtas melhoram a segurança mas aumentam a frequência de atualização de tokens
        value: 15
        user_override: false
        subgroup_id:
          where:
            slug: token-configuration
      - slug: refresh-token-expiration-minutes
        type: number
        component: input-number
        name:
          en: Refresh Token Lifetime
          pt: Duração do Token de Atualização
        description:
          en: Minutes before a refresh token expires. Used to obtain new access tokens without re-authentication
          pt: Minutos antes de um token de atualização expirar. Usado para obter novos tokens de acesso sem re-autenticação
        value: 43200
        user_override: false
        subgroup_id:
          where:
            slug: token-configuration
      - slug: max-concurrent-sessions
        type: number
        component: input-number
        name:
          en: Max Concurrent Sessions
          pt: Máximo de Sessões Simultâneas
        description:
          en: Maximum number of active sessions per user (0 = unlimited). Oldest sessions expire automatically when limit is reached
          pt: Número máximo de sessões ativas por usuário (0 = ilimitado). As sessões mais antigas expiram automaticamente quando o limite é atingido
        value: 0
        user_override: false
        subgroup_id:
          where:
            slug: session-management
- slug: localization
  icon: world
  name:
    en: Localization
    pt: Localização
  description:
    en: Configure language, timezone, and date/time formatting globally or per-user preference
    pt: Configure idioma, fuso horário e formatação de data/hora globalmente ou por preferência do usuário
  relations:
    setting:
      - slug: language
        type: string
        name:
          en: Default Language
          pt: Idioma Padrão
        description:
          en: System default language for all users. Each user can override this with their own preference
          pt: Idioma padrão do sistema para todos os usuários. Cada usuário pode substituir isso com sua própria preferência
        value: en
        user_override: true
        component: combobox
        relations:
          setting_list:
            - value: en
              order: 0
            - value: pt
              order: 1
        subgroup_id:
          where:
            slug: regional-settings
      - slug: timezone
        type: string
        component: combobox
        name:
          en: Timezone
          pt: Fuso Horário
        description:
          en: Default timezone for the system. Users can override this setting based on their location
          pt: Fuso horário padrão para o sistema. Os usuários podem substituir essa configuração com base em sua localização
        value: UTC
        user_override: true
        relations:
          setting_list:
            - value: UTC
              order: 0
            - value: America/Sao_Paulo
              order: 1
            - value: America/New_York
              order: 2
            - value: America/Los_Angeles
              order: 3
            - value: Europe/London
              order: 4
            - value: Europe/Paris
              order: 5
            - value: Asia/Tokyo
              order: 6
            - value: Australia/Sydney
              order: 7
        subgroup_id:
          where:
            slug: regional-settings
      - slug: time-format
        type: string
        component: combobox
        name:
          en: Time Format
          pt: Formato de Hora
        description:
          en: How times are displayed throughout the system (24-hour or 12-hour format)
          pt: Como os horários são exibidos em todo o sistema (formato 24 horas ou 12 horas)
        value: HH:mm:ss
        user_override: true
        relations:
          setting_list:
            - value: HH:mm:ss
              order: 0
            - value: hh:mm:ss a
              order: 1
            - value: HH:mm
              order: 2
            - value: hh:mm a
              order: 3
            - value: hh:mm
              order: 4
        subgroup_id:
          where:
            slug: date-time-formats
      - slug: date-format
        type: string
        component: combobox
        name:
          en: Date Format
          pt: Formato de Data
        description:
          en: How dates are displayed throughout the system
          pt: Como as datas são exibidas em todo o sistema
        value: dd/MM/yyyy
        user_override: true
        relations:
          setting_list:
            - value: dd/MM/yyyy
              order: 0
            - value: MM/dd/yyyy
              order: 1
            - value: yyyy-MM-dd
              order: 2
        subgroup_id:
          where:
            slug: date-time-formats
      - slug: currency
        type: string
        component: combobox
        name:
          en: Currency
          pt: Moeda
        description:
          en: Default currency used to format monetary values throughout the system
          pt: Moeda padrão usada para formatar valores monetários em todo o sistema
        value: BRL
        user_override: true
        relations:
          setting_list:
            - value: BRL
              order: 0
            - value: USD
              order: 1
            - value: EUR
              order: 2
            - value: GBP
              order: 3
        subgroup_id:
          where:
            slug: currency-format
- slug: oauth
  icon: brand-auth0
  name:
    en: OAuth
    pt: OAuth
  description:
    en: Configure OAuth providers and authentication settings for third-party identity integration
    pt: Configure provedores OAuth e configurações de autenticação para integração de identidade de terceiros
  relations:
    setting:
      - slug: oauth-role-assignment
        type: array
        component: checkbox
        name:
          en: Default Role
          pt: Função Padrão
        description:
          en: Role automatically assigned to new users registering via OAuth providers. If not set, the system default role is used
          pt: Função atribuída automaticamente a novos usuários registrados via provedores OAuth. Se não definido, a função padrão do sistema é usada
        value: ""
        user_override: false
        relations:
          setting_list:
            - value: admin
              order: 0
            - value: admin-access
              order: 1
            - value: user
              order: 2
        subgroup_id:
          where:
            slug: oauth-general
      - slug: oauth-google-profile-id
        type: string
        component: entity-picker
        name:
          en: Google OAuth Profile
          pt: Perfil OAuth Google
        description:
          en: Integration profile (type OAuth / Google) used for Google authentication
          pt: Perfil de integração (tipo OAuth / Google) utilizado para autenticação com Google
        value: ""
        user_override: false
        subgroup_id:
          where:
            slug: google
      - slug: oauth-google-enabled
        type: boolean
        component: switch
        name:
          en: Enable Google
          pt: Habilitar Google
        description:
          en: Enable or disable Google OAuth without removing the configured profile
          pt: Habilitar ou desabilitar OAuth do Google sem remover o perfil configurado
        value: 'false'
        user_override: false
        subgroup_id:
          where:
            slug: google
      - slug: oauth-google-scopes
        type: array
        component: checkbox
        name:
          en: OAuth Scopes
          pt: Escopos OAuth
        description:
          en: Permissions requested from the user during Google OAuth flow
          pt: Permissões solicitadas ao usuário durante o fluxo OAuth do Google
        value: '["email","profile"]'
        user_override: false
        relations:
          setting_list:
            - value: email
              order: 0
            - value: profile
              order: 1
            - value: openid
              order: 2
        subgroup_id:
          where:
            slug: google
      - slug: oauth-facebook-profile-id
        type: string
        component: entity-picker
        name:
          en: Facebook OAuth Profile
          pt: Perfil OAuth Facebook
        description:
          en: Integration profile (type OAuth / Facebook) used for Facebook authentication
          pt: Perfil de integração (tipo OAuth / Facebook) utilizado para autenticação com Facebook
        value: ""
        user_override: false
        subgroup_id:
          where:
            slug: facebook
      - slug: oauth-facebook-enabled
        type: boolean
        component: switch
        name:
          en: Enable Facebook
          pt: Habilitar Facebook
