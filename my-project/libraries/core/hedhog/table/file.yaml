columns:
  - type: pk
  - name: filename # nome original do arquivo
  - name: path # caminho/chave real do arquivo no storage
  - name: provider_id
    type: fk
    references:
      table: file_provider
      column: id
      onDelete: CASCADE
  - name: location
  - name: mimetype_id
    type: fk
    references:
      table: file_mimetype
      column: id
      onDelete: CASCADE
  - name: size
    type: int
    unsigned: true
    default: 0
  - type: created_at
  - type: updated_at