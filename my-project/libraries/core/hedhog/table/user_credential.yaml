columns:
  - type: pk
  - name: user_id
    type: fk
    references:
      table: user
      column: id
      onDelete: CASCADE
  - name: type
    type: enum
    values:
      - password
  - name: hash
  - name: revoked_at
    type: datetime
    isNullable: true
  - name: expires_at
    type: datetime
    isNullable: true
  - name: requires_reset
    type: boolean
    default: false
  - type: created_at
  - type: updated_at