<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{errorTitle}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    h1 {
      color: #d32f2f;
      font-size: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .message {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    .details {
      background: #f5f5f5;
      border-left: 4px solid #d32f2f;
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 24px;
    }
    .details-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .details-content {
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      word-break: break-word;
    }
    .back-button {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚠️</div>
    <h1>{{errorTitle}}</h1>
    <p class="message">
      {{errorMessage}}
    </p>
    <div class="details">
      <div class="details-title">{{errorDetailsLabel}}</div>
      <div class="details-content">{{errorDetails}}</div>
    </div>
  </div>
</body>
</html>
